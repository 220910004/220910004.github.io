<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Section Not Found</title>
<meta name="theme-color" content="#08080a">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚙️</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#08080a;color:#e8e6e1;font-family:'JetBrains Mono',monospace;min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px;cursor:crosshair}
h1{font-family:'Syne',sans-serif;font-size:clamp(4rem,15vw,10rem);font-weight:800;-webkit-text-stroke:1px #55555a;color:transparent;line-height:1}
p{font-size:.7rem;color:#55555a;letter-spacing:.15em;text-transform:uppercase}
a{font-size:.65rem;color:#ff4d00;border:1px solid #ff4d00;padding:10px 24px;text-decoration:none;letter-spacing:.1em;transition:all .2s}
a:hover{background:rgba(255,77,0,.08)}
.grid{position:fixed;inset:0;pointer-events:none;opacity:.04;background:repeating-linear-gradient(0deg,#648cd2 0 1px,transparent 1px 24px),repeating-linear-gradient(90deg,#648cd2 0 1px,transparent 1px 24px)}
</style>
</head>
<body>
<div class="grid"></div>
<h1>404</h1>
<p>ERROR: SECTION NOT FOUND — CHECK DWG REFERENCE</p>
<a href="/">← RETURN TO MAIN DRAWING</a>
</body>
</html>
