/* ══ SOUND ══ */
var audioCtx=null,soundOn=false,masterGain=null;
function initSound(){
  if(audioCtx)return;
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  masterGain=audioCtx.createGain();masterGain.gain.value=0;masterGain.connect(audioCtx.destination);
  var bufSz=2*audioCtx.sampleRate,buf=audioCtx.createBuffer(1,bufSz,audioCtx.sampleRate),d=buf.getChannelData(0);
  for(var i=0;i<bufSz;i++)d[i]=Math.random()*2-1;
  var noise=audioCtx.createBufferSource();noise.buffer=buf;noise.loop=true;
  var filt=audioCtx.createBiquadFilter();filt.type='lowpass';filt.frequency.value=180;
  var ng=audioCtx.createGain();ng.gain.value=.06;
  noise.connect(filt);filt.connect(ng);ng.connect(masterGain);noise.start();
  var osc=audioCtx.createOscillator();osc.type='sine';osc.frequency.value=72;
  var og=audioCtx.createGain();og.gain.value=.025;
  osc.connect(og);og.connect(masterGain);osc.start();
  var osc2=audioCtx.createOscillator();osc2.type='sine';osc2.frequency.value=108;
  var og2=audioCtx.createGain();og2.gain.value=.012;
  osc2.connect(og2);og2.connect(masterGain);osc2.start();
}
function toggleSound(on){
  initSound();
  soundOn=on;
  if(audioCtx.state==='suspended')audioCtx.resume();
  masterGain.gain.linearRampToValueAtTime(on?1:0,audioCtx.currentTime+.5);
  document.getElementById('btn-snd').textContent='Sound: '+(on?'on':'off');
  document.getElementById('btn-snd').classList.toggle('on',on);
}

/* ══ INTRO ══ */
var intro=document.getElementById('intro');
document.getElementById('btn-sound').addEventListener('click',function(){toggleSound(true);intro.classList.add('hide')});
document.getElementById('btn-nosound').addEventListener('click',function(){intro.classList.add('hide')});
document.getElementById('btn-snd').addEventListener('click',function(){toggleSound(!soundOn)});

/* ══ THREE.JS ══ */
var canvas=document.getElementById('world');
var typoEl=document.getElementById('typo-text');
var cueEl=document.getElementById('cue');
var ffHint=document.getElementById('ff-hint');
var labels=[];for(var i=0;i<7;i++)labels.push(document.getElementById('ml'+i));

function hash(x,y){var n=Math.sin(x*127.1+y*311.7)*43758.5453;return n-Math.floor(n)}
function sn(x,y){var ix=Math.floor(x),iy=Math.floor(y),fx=x-ix,fy=y-iy,sx=fx*fx*(3-2*fx),sy=fy*fy*(3-2*fy);
return hash(ix,iy)*(1-sx)*(1-sy)+hash(ix+1,iy)*sx*(1-sy)+hash(ix,iy+1)*(1-sx)*sy+hash(ix+1,iy+1)*sx*sy}
function fbm(x,y){var v=0,a=.5,f=1;for(var i=0;i<5;i++){v+=a*sn(x*f,y*f);a*=.5;f*=2}return v}
function terrainH(x,z){return fbm(x*.012+50,z*.012+50)*22-8}

if(typeof THREE!=='undefined'){
var W=window.innerWidth,H=window.innerHeight;
var scene=new THREE.Scene();
scene.fog=new THREE.FogExp2(0x000000,.006);
var camera=new THREE.PerspectiveCamera(55,W/H,.1,500);
camera.position.set(0,30,60);camera.lookAt(0,0,0);
var renderer=new THREE.WebGLRenderer({canvas:canvas,antialias:true});
renderer.setSize(W,H);renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setClearColor(0x000000);

/* Lights */
var dl=new THREE.DirectionalLight(0xffffff,.5);dl.position.set(30,50,20);scene.add(dl);
scene.add(new THREE.AmbientLight(0x333333,.4));

/* Terrain */
var TS=300,TSEG=150;
var tGeo=new THREE.PlaneGeometry(TS,TS,TSEG,TSEG);
tGeo.rotateX(-Math.PI/2);
var tp=tGeo.attributes.position;
for(var i=0;i<tp.count;i++){
  var x=tp.getX(i),z=tp.getZ(i);
  tp.setY(i,terrainH(x,z));
}
tGeo.computeVertexNormals();
var tMat=new THREE.MeshStandardMaterial({color:0x1a1a1a,flatShading:true,roughness:.9,metalness:.1});
var terrain=new THREE.Mesh(tGeo,tMat);
scene.add(terrain);

/* Wireframe */
var wMat=new THREE.MeshBasicMaterial({wireframe:true,color:0x333333,transparent:true,opacity:.08});
var wire=new THREE.Mesh(tGeo,wMat);
scene.add(wire);

/* Markers */
var markerData=[
  {x:-35,z:-40,label:'Manifesto'},
  {x:25,z:-80,label:'Experience'},
  {x:-15,z:-120,label:'Publication'},
  {x:30,z:-160,label:'Skills'},
  {x:-25,z:-200,label:'Education'},
  {x:15,z:-240,label:'References'},
  {x:0,z:-275,label:'Contact'}
];
var markers=[];
var mGeo=new THREE.OctahedronGeometry(1.2,0);
markerData.forEach(function(md,i){
  var y=terrainH(md.x,md.z)+3;
  var mMat=new THREE.MeshBasicMaterial({color:0xff4d00,transparent:true,opacity:.85});
  var m=new THREE.Mesh(mGeo,mMat);
  m.position.set(md.x,y,md.z);
  m.userData={idx:i};
  scene.add(m);
  markers.push(m);
  /* Glow ring */
  var rGeo=new THREE.RingGeometry(1.8,2.2,24);
  var rMat=new THREE.MeshBasicMaterial({color:0xff4d00,transparent:true,opacity:.15,side:THREE.DoubleSide});
  var ring=new THREE.Mesh(rGeo,rMat);
  ring.position.set(md.x,y,md.z);
  ring.rotation.x=-Math.PI/2;
  scene.add(ring);
});

/* Camera path */
var camPath=new THREE.CatmullRomCurve3([
  new THREE.Vector3(0,30,60),
  new THREE.Vector3(-20,22,10),
  new THREE.Vector3(15,18,-30),
  new THREE.Vector3(-10,25,-70),
  new THREE.Vector3(20,15,-110),
  new THREE.Vector3(-18,20,-150),
  new THREE.Vector3(10,22,-190),
  new THREE.Vector3(-8,18,-230),
  new THREE.Vector3(0,25,-270),
  new THREE.Vector3(0,35,-300)
]);

/* Typography sequence */
var typoLines=['Hey','I\'m Furkan','This is my stress field'];
var typoZone=3; /* first 3/14 of scroll = typography */

/* Raycaster */
var raycaster=new THREE.Raycaster();
var mouse2=new THREE.Vector2();
var hovered=-1;

canvas.addEventListener('mousemove',function(e){
  mouse2.x=(e.clientX/W)*2-1;
  mouse2.y=-(e.clientY/H)*2+1;
  raycaster.setFromCamera(mouse2,camera);
  var hits=raycaster.intersectObjects(markers);
  var newHov=hits.length>0?hits[0].object.userData.idx:-1;
  if(newHov!==hovered){
    if(hovered>=0)markers[hovered].scale.set(1,1,1);
    hovered=newHov;
    if(hovered>=0){markers[hovered].scale.set(1.5,1.5,1.5);canvas.style.cursor='none'}
  }
});

canvas.addEventListener('click',function(e){
  if(freeflight)return;
  mouse2.x=(e.clientX/W)*2-1;
  mouse2.y=-(e.clientY/H)*2+1;
  raycaster.setFromCamera(mouse2,camera);
  var hits=raycaster.intersectObjects(markers);
  if(hits.length>0)openPopup(hits[0].object.userData.idx);
});

/* Freeflight */
var freeflight=false,yaw=0,pitch=0,keys={};
document.getElementById('btn-fly').addEventListener('click',function(){
  freeflight=!freeflight;
  this.classList.toggle('on',freeflight);
  this.textContent=freeflight?'Exit flight':'It\'s time to fly!';
  ffHint.style.display=freeflight?'block':'none';
  if(freeflight){
    var dir=new THREE.Vector3();camera.getWorldDirection(dir);
    yaw=Math.atan2(dir.x,dir.z);pitch=Math.asin(dir.y);
    canvas.requestPointerLock();
  }else{
    document.exitPointerLock();
  }
});
document.addEventListener('pointerlockchange',function(){
  if(!document.pointerLockElement&&freeflight){
    freeflight=false;
    document.getElementById('btn-fly').classList.remove('on');
    document.getElementById('btn-fly').textContent='It\'s time to fly!';
    ffHint.style.display='none';
  }
});
document.addEventListener('mousemove',function(e){
  if(!freeflight||!document.pointerLockElement)return;
  yaw-=e.movementX*.002;
  pitch-=e.movementY*.002;
  pitch=Math.max(-1.4,Math.min(1.4,pitch));
});
document.addEventListener('keydown',function(e){keys[e.key.toLowerCase()]=true});
document.addEventListener('keyup',function(e){keys[e.key.toLowerCase()]=false});

function updateFreeflight(){
  var sp=.6;
  var dir=new THREE.Vector3();
  if(keys['w'])dir.z-=1;if(keys['s'])dir.z+=1;
  if(keys['a'])dir.x-=1;if(keys['d'])dir.x+=1;
  if(keys[' '])dir.y+=1;if(keys['shift'])dir.y-=1;
  dir.normalize().multiplyScalar(sp);
  var euler=new THREE.Euler(pitch,yaw,0,'YXZ');
  dir.applyEuler(euler);
  camera.position.add(dir);
  camera.rotation.copy(euler);
}

/* Scroll */
var prog=0;
window.addEventListener('scroll',function(){
  var maxS=document.documentElement.scrollHeight-window.innerHeight;
  prog=maxS>0?window.scrollY/maxS:0;
},{passive:true});

/* Render */
var clock=new THREE.Clock();
(function anim(){
  requestAnimationFrame(anim);
  var t=clock.getElapsedTime();

  if(freeflight){
    updateFreeflight();
  }else{
    /* Scroll camera */
    var cp=camPath.getPointAt(Math.min(prog,.999));
    var lp=camPath.getPointAt(Math.min(prog+.03,.999));
    camera.position.lerp(cp,.08);
    var lookTarget=new THREE.Vector3().copy(lp);
    camera.lookAt(lookTarget);
  }

  /* Marker animation */
  markers.forEach(function(m,i){
    m.rotation.y=t*.5+i;
    m.position.y=markerData[i].x?terrainH(markerData[i].x,markerData[i].z)+3+Math.sin(t*1.2+i)*0.4:0;
  });

  /* Typography */
  var typoP=prog*14/typoZone;
  if(typoP<typoLines.length){
    var li=Math.min(Math.floor(typoP),typoLines.length-1);
    var lt=typoP-li;
    var op=lt<.15?lt/.15:lt>.85?(1-lt)/.15:1;
    typoEl.textContent=typoLines[li];
    typoEl.style.opacity=op;
  }else{
    typoEl.style.opacity=0;
  }

  /* Cue */
  cueEl.style.opacity=Math.max(0,1-prog*20);

  /* Marker labels */
  markers.forEach(function(m,i){
    var v=m.position.clone();
    v.y+=2.5;
    v.project(camera);
    var x=(v.x*.5+.5)*W;
    var y=(-(v.y*.5)+.5)*H;
    var lbl=labels[i];
    if(v.z<1&&x>0&&x<W&&y>0&&y<H){
      lbl.style.left=x+'px';
      lbl.style.top=y+'px';
      lbl.style.opacity=hovered===i?1:0;
    }else{
      lbl.style.opacity=0;
    }
  });

  renderer.render(scene,camera);
})();

window.addEventListener('resize',function(){
  W=window.innerWidth;H=window.innerHeight;
  camera.aspect=W/H;camera.updateProjectionMatrix();
  renderer.setSize(W,H);
});

}else{
  canvas.style.background='radial-gradient(ellipse at 50% 60%,#111,#000)';
}

})();
</script>
</body>
</html>
